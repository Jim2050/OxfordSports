# Render blueprint for one-click deployment
services:
  - type: web
    name: oxford-sports
    runtime: node
    rootDir: Backend
    plan: free
    buildCommand: cd ../Frontend && npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: ORDER_EMAIL
        value: sales@oxfordsports.online
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
